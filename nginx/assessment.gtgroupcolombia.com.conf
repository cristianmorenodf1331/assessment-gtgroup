# ──────────────────────────────────────────────────────────────────────────────
#  Nginx – assessment.gtgroupcolombia.com
#  Plataforma de diagnóstico de ciberseguridad GTGroup · NIST CSF 2.0
# ──────────────────────────────────────────────────────────────────────────────

# Redirigir HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name assessment.gtgroupcolombia.com;
    return 301 https://$host$request_uri;
}

# Servidor HTTPS principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name assessment.gtgroupcolombia.com;

    # ── SSL (Let's Encrypt – Certbot lo rellena automáticamente) ─────────────
    ssl_certificate     /etc/letsencrypt/live/assessment.gtgroupcolombia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/assessment.gtgroupcolombia.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Seguridad ─────────────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/assessment.access.log;
    error_log  /var/log/nginx/assessment.error.log;

    # ── Frontend (React build estático) ──────────────────────────────────────
    root /var/www/assessment-gtgroup/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Assets con caché larga
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API (proxy al backend Node.js) ────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Bloqueos básicos ──────────────────────────────────────────────────────
    location ~ /\. { deny all; }
    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; }
}
